name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: laborax
          POSTGRES_PASSWORD: laborax
          POSTGRES_DB: laborax_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U laborax"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://laborax:laborax@localhost:5432/laborax_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Alembic migrations apply cleanly
        env:
          DATABASE_URL: postgresql+asyncpg://laborax:laborax@localhost:5432/laborax_test
        run: alembic upgrade head

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint scripts/ (repo-root helper scripts)
        run: ruff check ../scripts

      - name: Ruff format check scripts/
        run: ruff format --check ../scripts

      - name: mypy
        run: mypy app

      - name: mypy scripts/
        run: mypy ../scripts --ignore-missing-imports

      - name: pytest
        run: pytest

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  smoke:
    name: Load smoke test (Sprint 6)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: laborax
          POSTGRES_PASSWORD: laborax
          POSTGRES_DB: laborax
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U laborax"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://laborax:laborax@localhost:5432/laborax
      JWT_SECRET_KEY: ci-smoke-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Apply migrations and seed reference data
        run: |
          alembic upgrade head
          python -m app.db.seed

      - name: Start API server
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health

      - name: Run load smoke test
        run: python ../scripts/load_smoke_test.py --base-url http://localhost:8000 --concurrency 10

      - name: Show server logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log

  docker-build:
    name: Docker build sanity check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t laborax-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t laborax-frontend:ci ./frontend
