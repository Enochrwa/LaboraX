# Fly.io config — the Fly.io half of `docs/HLD.md`'s "Backend | Render or
# Fly.io | Free/low-cost tier, single FastAPI container" choice. Use this
# instead of `infra/render.yaml`, not alongside it.
#
# One-time setup once a Fly.io account exists:
#   flyctl launch --no-deploy --copy-config --dockerfile backend/Dockerfile
#   flyctl secrets set DATABASE_URL=... REDIS_URL=... JWT_SECRET_KEY=... ALLOWED_ORIGINS=...
#   flyctl deploy
app = "laborax-backend"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
