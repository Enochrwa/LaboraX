services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: laborax
      POSTGRES_PASSWORD: laborax
      POSTGRES_DB: laborax
    ports: ["5432:5432"]
    volumes: ["laborax-postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laborax"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://laborax:laborax@postgres:5432/laborax
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["./backend:/app"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["5173:80"]
    depends_on: [backend]

volumes:
  laborax-postgres-data:
